name: Continuous Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            out_name: mini-wsbroad-linux
          - os: windows-latest
            out_name: mini-wsbroad-windows.exe
          - os: macos-latest
            out_name: mini-wsbroad-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasio-dev build-essential

      - name: Configure and Build
        shell: bash
        run: |
          # 针对 Windows 警告，修改代码去掉重复定义（或者 CMake 里处理）
          # 这里直接编译
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # 兼容 MSVC 目录结构
            mv build/Release/mini-wsbroad.exe ${{ matrix.out_name }}
          else
            mv build/mini-wsbroad ${{ matrix.out_name }}
          fi

      - name: Upload to Job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: ${{ matrix.out_name }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Latest Pre-release (${{ github.sha }})"
          body: "Auto-build for multiple platforms. This version is a static/semi-static build for maximum compatibility."
          prerelease: true
          make_latest: true
          files: |
            mini-wsbroad-linux
            mini-wsbroad-windows.exe
            mini-wsbroad-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
