name: Continuous Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04  # 使用旧版 Ubuntu 以获得更好的 GLIBC 兼容性
            out_name: mini-wsbroad-linux
          - os: windows-latest
            out_name: mini-wsbroad-windows.exe
          - os: macos-latest
            out_name: mini-wsbroad-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasio-dev

      - name: Configure and Build
        shell: bash
        run: |
          # 针对 Windows 的宏冲突，CMake 命令行不再重复定义，交由 CMakeLists 处理
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp build/Release/mini-wsbroad.exe ./${{ matrix.out_name }}
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp build/mini-wsbroad ./${{ matrix.out_name }}
          else
            # Linux 编译出后重命名
            cp build/mini-wsbroad ./${{ matrix.out_name }}
          fi

      - name: Upload to Job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: ${{ matrix.out_name }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Latest Pre-release"
          body: "Auto-updated build: ${{ github.event.head_commit.message }}"
          prerelease: true
          make_latest: true
          files: |
            mini-wsbroad-linux
            mini-wsbroad-windows.exe
            mini-wsbroad-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
