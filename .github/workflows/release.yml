name: Continuous Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            out_name: mini-wsbroad-linux
          - os: windows-latest
            out_name: mini-wsbroad-windows.exe
          - os: macos-latest
            out_name: mini-wsbroad-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure and Build
        shell: bash
        run: |
          # 无论什么平台，统一使用标准 CMake 命令
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # MSVC 产物在 Release 子目录
            mv build/Release/mini-wsbroad.exe ${{ matrix.out_name }}
          else
            # Linux/macOS 产物直接在 build 目录
            mv build/mini-wsbroad ${{ matrix.out_name }}
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: ${{ matrix.out_name }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Latest Pre-release"
          body: "Auto-build at $(date)"
          prerelease: true
          make_latest: true
          files: |
            mini-wsbroad-linux
            mini-wsbroad-windows.exe
            mini-wsbroad-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
